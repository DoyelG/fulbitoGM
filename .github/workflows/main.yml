name: fulbito-yml

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.5

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Run ESLint
        run: pnpm lint

      - name: Build
        run: pnpm build

  deploy-backend:
    needs: lint-test-build
    runs-on: ubuntu-latest
    outputs:
      backend_url: ${{ steps.get_url.outputs.url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy Backend
        id: get_url
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
        run: |
          set -eo pipefail

          ARGS="--token=$VERCEL_TOKEN --yes"
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            ARGS="$ARGS --prod"
            echo "Deploying backend to PRODUCTION"
          else
            echo "Deploying backend to PREVIEW (branch: ${{ github.ref }})"
          fi

          curl -sf -X PATCH "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"rootDirectory":"apps/backend"}' > /dev/null

          echo "--- Running: vercel deploy (backend) ---"
          vercel deploy $ARGS 2>&1 | tee /tmp/backend_deploy.log
          echo "--- Deploy command finished ---"

          URL=$(grep -E "^https://" /tmp/backend_deploy.log | tail -1)
          if [ -z "$URL" ]; then
            echo "ERROR: Could not extract deployment URL from output"
            echo "Full output:"
            cat /tmp/backend_deploy.log
            exit 1
          fi

          echo "Backend deployed to: $URL"
          echo "url=$URL" >> $GITHUB_OUTPUT

  deploy-frontend:
    needs: deploy-backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy Frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}
        run: |
          set -eo pipefail

          ARGS="--token=$VERCEL_TOKEN --yes"
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            ARGS="$ARGS --prod"
            echo "Deploying frontend to PRODUCTION"
          else
            echo "Deploying frontend to PREVIEW (branch: ${{ github.ref }})"
          fi

          curl -sf -X PATCH "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"rootDirectory":"apps/web"}' > /dev/null

          if [ "${{ github.ref }}" != "refs/heads/master" ]; then
            BRANCH_NAME="${{ github.head_ref }}"
            BACKEND_URL_VALUE="${{ needs.deploy-backend.outputs.backend_url }}"
            echo "Setting branch-specific BACKEND_URL → $BACKEND_URL_VALUE"

            EXISTING_ID=$(curl -sf "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env" \
              -H "Authorization: Bearer $VERCEL_TOKEN" | \
              jq -r --arg b "$BRANCH_NAME" \
              '[.envs[] | select(.key == "BACKEND_URL" and .gitBranch == $b)] | first | .id // ""')

            if [ -n "$EXISTING_ID" ]; then
              curl -sf -X PATCH "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env/$EXISTING_ID" \
                -H "Authorization: Bearer $VERCEL_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"value\":\"$BACKEND_URL_VALUE\"}" > /dev/null
            else
              curl -sf -X POST "https://api.vercel.com/v10/projects/$VERCEL_PROJECT_ID/env" \
                -H "Authorization: Bearer $VERCEL_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"key\":\"BACKEND_URL\",\"value\":\"$BACKEND_URL_VALUE\",\"type\":\"encrypted\",\"target\":[\"preview\"],\"gitBranch\":\"$BRANCH_NAME\"}" > /dev/null
            fi
          fi

          echo "--- Running: vercel deploy (frontend) ---"
          vercel deploy $ARGS
          echo "--- Frontend deploy finished ---"